on:
  schedule:
    - cron: '41 18 * * *'
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

jobs:
    build-and-publish:
      runs-on: ubuntu-latest
      name: My workflow
      steps:
        - name: Execute Action Graph
          uses: actionforge/action@1cb7c397d2c7caa8d8071041976b6f2e4e2ead20 # v0.9.58
          with:
            graph_file: new-1.yml